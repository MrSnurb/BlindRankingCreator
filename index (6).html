  .slot .label-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.78)); padding:14px 4px 4px; }

  .ic { background:var(--surface2); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1.25rem; text-align:center; position:relative; overflow:hidden; }

  .s .fr { font-size:10px; color:var(--text3); margin-top:3px; }

  .hi strong { color:var(--text2); font-family:'Oswald',sans-serif; letter-spacing:0.03em; }
  .img-card { background:var(--surface2); border:1px solid rgba(255,255,255,0.06); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:1.25rem; position:relative; }

  .img-card .img-label { padding:10px 14px 4px; font-size:14px; color:var(--text); font-weight:500; text-align:center; }

  .stat-row { display:flex; gap:12px; margin-bottom:1.5rem; }
  .stat-box { flex:1; background:var(--surface2); border-radius:var(--radius); padding:.75rem; text-align:center; }
  .stat-num { font-family:'Oswald',sans-serif; font-size:24px; font-weight:700; color:var(--gold); }
  .stat-lbl { font-size:11px; color:var(--text3); margin-top:2px; }

  /* personal result card */

  .result-card-body { padding:1rem 1.25rem; }

  /* lang bar */

  .lb { padding:4px 10px; font-size:16px; border:1px solid rgba(255,255,255,0.08); border-radius:var(--radius); background:var(--surface2); cursor:pointer; transition:border-color .15s,background .15s; line-height:1; }
  .lb:hover { border-color:var(--gold-border); background:var(--gold-bg); }
  .lb.active { border-color:var(--gold-border); background:var(--gold-bg); }
</style>

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmtDate(ts){return new Date(ts).toLocaleDateString(t('dateLocale'),{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}

// maxBytes: target max base64 size per image (default ~12KB → safe for 10 images under 90KB total)
function compressImage(file, maxBytes=8500){
  return new Promise(resolve=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      if(!img.width||!img.height){resolve(null);return;}
      try{
        // Try decreasing sizes until we fit within maxBytes
        const sizes=[240,180,140,100];
        const qualities=[0.55,0.45,0.38,0.30];
        let result=null;
        for(let attempt=0;attempt<sizes.length;attempt++){
          const MAX=sizes[attempt];
          let w=img.width,h=img.height;
          if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}
          const cv=document.createElement('canvas');cv.width=w;cv.height=h;
          cv.getContext('2d').drawImage(img,0,0,w,h);
          let dataUrl=cv.toDataURL('image/jpeg',qualities[attempt]);
          if(!dataUrl||dataUrl==='data:,'||dataUrl.length<200){
            dataUrl=cv.toDataURL('image/png');
          }
          if(dataUrl&&dataUrl.length>200){
            result=dataUrl;
            if(dataUrl.length<=maxBytes)break; // fits within budget
          }
        }
        resolve(result);
      }catch(e){resolve(null);}
    };
    img.onerror=()=>{URL.revokeObjectURL(url);resolve(null);};
    img.src=url;
  });
}

async function createBin(data,name){
  const res=await fetch(JB,{method:'POST',headers:{...H,'X-Bin-Private':'false','X-Bin-Name':(name||'ranking').substring(0,30)},body:JSON.stringify(data)});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const id=(await res.json()).metadata?.id;
  if(!id)throw new Error('No ID');
  return id;
}
async function readBin(id){
  const res=await fetch(`${JB}/${id}/latest`,{headers:{'X-Master-Key':API_KEY}});
  if(!res.ok)throw new Error('HTTP '+res.status);
  return(await res.json()).record;
}
async function updateBin(id,data){
  const res=await fetch(`${JB}/${id}`,{method:'PUT',headers:H,body:JSON.stringify(data)});
  if(!res.ok)throw new Error('HTTP '+res.status);
}

function copyBtn(el,text){
  el.onclick=async()=>{
    let ok=false;
    try{await navigator.clipboard.writeText(text);ok=true;}catch(e){}
    if(!ok){
      try{
        const prev=el.previousElementSibling;
        if(prev){const r=document.createRange();r.selectNodeContents(prev);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
      }catch(e2){}
    }
    el.textContent=t('copied');el.classList.add('copied');
    setTimeout(()=>{el.textContent=t('copy');el.classList.remove('copied');},2500);
  };
}
function linkSection(lbl,url,extra){
  const id='ls'+Math.random().toString(36).slice(2);
  setTimeout(()=>{const b=document.getElementById(id);if(b)copyBtn(b,url);},50);
  return`<div class="link-section">${extra||''}<div class="lbl">${lbl}</div><div class="url-row"><div class="url-display">${esc(url)}</div><button class="copy-btn" id="${id}">${t('copy')}</button></div></div>`;
}

function initImageCreator(slotCount=5){
  pageRerender=()=>initImageCreator(slotCount);
  const app=document.getElementById('app');
  const slots=Array(slotCount).fill(null).map(()=>({img:null,label:''}));
  app.innerHTML=`
    <button class="back-btn" id="back">${t('back')}</button>
    <div class="brand"><span class="crown">🏆</span><h1>${t('imgCreatorTitle')}</h1></div>
    <p class="desc">${t('imgCreatorDesc')}</p>
    <div class="field"><label>${t('titleLabel')}</label><input type="text" id="title" placeholder="${t('imgTitlePlaceholder')}"/></div>
    <div class="field">
      <label>${t('imagesLabel')} <span id="slot-count" style="opacity:.4">(0/${slotCount})</span></label>
      <div class="slots-grid" id="slots-grid"></div>
    </div>
    <hr class="divider">
    <button class="btn-primary" id="gen-btn" disabled>${t('createLinks')}</button>
    <div class="err-box" id="err-box"></div>
    <div class="link-box" id="link-box">
      <div id="link-play"></div><div class="sep"></div><div id="link-group"></div>
    </div>`;
  document.getElementById('back').onclick=()=>chooseCount('image');

  function renderSlots(){
    const grid=document.getElementById('slots-grid');grid.innerHTML='';
    slots.forEach((s,i)=>{
      const div=document.createElement('div');div.className='slot'+(s.img?' filled':'');
      if(s.img){div.innerHTML=`<img src="${s.img}" alt="${t('imgSlotLabel')} ${i+1}"><div class="label-overlay"><input type="text" class="label-input" placeholder="${t('imgLabelPlaceholder')}" value="${esc(s.label)}" data-lidx="${i}"></div><button class="remove-btn" data-ridx="${i}">✕</button>`;}
      else{div.innerHTML=`<div class="plus">＋</div><div class="slot-num">${t('imgSlotLabel')} ${i+1}</div>`;div.addEventListener('click',()=>openPicker(i));}
      div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over');});
      div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
      div.addEventListener('drop',async e=>{e.preventDefault();div.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('image/')){const compressed=await compressImage(f);if(compressed){slots[i].img=compressed;renderSlots();chk();}else{const eb=document.getElementById('err-box');if(eb){eb.textContent='❌ '+t('imgLoadErr');eb.style.display='block';}}}});
      grid.appendChild(div);
    });
    grid.querySelectorAll('.label-input').forEach(el=>el.addEventListener('input',e=>{slots[+e.target.dataset.lidx].label=e.target.value;}));
    grid.querySelectorAll('.remove-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();slots[+el.dataset.ridx].img=null;slots[+el.dataset.ridx].label='';renderSlots();chk();}));
    document.getElementById('slot-count').textContent=`(${slots.filter(s=>s.img).length}/${slotCount})`;
  }
  function openPicker(idx){
    const inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.style.cssText='position:fixed;top:-9999px;opacity:0';
    document.body.appendChild(inp);
    inp.onchange=async()=>{
      const f=inp.files[0];
      try{document.body.removeChild(inp);}catch(e){}
      if(f){
        const compressed=await compressImage(f);
        if(compressed){slots[idx].img=compressed;renderSlots();chk();}
        else{const eb=document.getElementById('err-box');if(eb){eb.textContent='❌ '+t('imgLoadErr');eb.style.display='block';}}
      }
    };
    // iOS: needs a tiny delay after DOM insert
    setTimeout(()=>inp.click(),10);
  }
  function chk(){const tv=document.getElementById('title').value.trim();document.getElementById('gen-btn').disabled=!(tv&&slots.filter(s=>s.img).length>=2);}
  document.getElementById('title').addEventListener('input',chk);

  document.getElementById('gen-btn').addEventListener('click',async()=>{
    const title=document.getElementById('title').value.trim();
    const filledItems=slots.filter(s=>s.img).map(s=>({img:s.img,label:s.label.trim()}));
    const btn=document.getElementById('gen-btn'),errBox=document.getElementById('err-box');
    btn.disabled=true;btn.innerHTML=`<span class="spinner"></span> ${t('creating')}`;
    errBox.style.display='none';document.getElementById('link-box').style.display='none';
    let intro='';
    try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:t('aiPromptImg'),messages:[{role:'user',content:`Title: "${title}", ${filledItems.length} images`}]})});intro=(await r.json()).content?.[0]?.text?.trim()||'';}catch(e){}
    if(!intro)intro=t('aiDefaultImg',filledItems.length);
    // Check payload size before sending (~100KB JSONBin free limit)
    const payload={type:'image',title,intro,items:filledItems,resultsId:'__placeholder__',lang:LANG};
    const payloadSize=new Blob([JSON.stringify(payload)]).size;
    if(payloadSize>90000){
      errBox.textContent='❌ '+t('imgSizeErr')+' ('+Math.round(payloadSize/1024)+' KB)';
      errBox.style.display='block';
      btn.disabled=false;btn.innerHTML=t('createLinks');
      return;
    }
    try{
      const rId=await createBin({submissions:[]},'results-'+title.substring(0,20));
      const bId=await createBin({type:'image',title,intro,items:filledItems,resultsId:rId,lang:LANG},title);
      const base=location.origin+location.pathname;
      document.getElementById('link-play').innerHTML=linkSection(t('playLinkLabel'),base+'?bin='+bId,`<div style="font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;text-transform:uppercase">${esc(title)}</div><div style="font-size:13px;color:var(--text2);margin-bottom:.75rem">${esc(intro)}</div>`);
      document.getElementById('link-group').innerHTML=linkSection(t('groupLinkLabel'),base+'?results='+rId);
      document.getElementById('link-box').style.display='block';
    }catch(e){errBox.textContent='❌ '+e.message;errBox.style.display='block';}
    btn.disabled=false;btn.innerHTML=t('createLinks');
  });
  renderSlots();
}

      </div>

  document.getElementById('submit-btn').addEventListener('click',async()=>{
    const name=document.getElementById('player-name').value.trim()||t('anon');

      const base=location.origin+location.pathname;
      const personalURL=base+'?result='+personalId;
      const groupURL=d.resultsId?base+'?results='+d.resultsId:null;
      document.getElementById('submit-box').outerHTML=`
        <div class="link-box" style="display:block" id="share-links">
          ${linkSection(t('shareMyResult'),personalURL,`<div style="font-size:13px;color:var(--text2);margin-bottom:.75rem">${t('shareResultDesc')}</div>`)}
          ${groupURL?'<div class="sep"></div>'+linkSection(t('seeAllResults'),groupURL):''}
        </div>`;
    }catch(e){btn.disabled=false;btn.innerHTML=t('submit');alert(e.message);}
  });
}

function playText(d,binId){
  const app=document.getElementById('app');
  const st={view:'start',d,q:shuffle(d.items),i:0,sl:{},tot:d.items.length};
  function render(){if(st.view==='start')rStart();else if(st.view==='rank')rRank();else rResult();}
  function rStart(){
    app.innerHTML=`<div class="brand" style="margin-bottom:.4rem"><span class="crown">🏆</span><h1>${esc(d.title)}</h1></div><p class="sub">${t('blindRanking')} · ${st.tot} ${t('items')}</p><div class="intro-box">${esc(d.intro||'')}</div><button class="btn-primary" id="sb">${t('startBtn')}</button>`;
    document.getElementById('sb').onclick=()=>{st.view='rank';render();};
  }
  function rRank(){
    const cur=st.q[st.i],rem=st.tot-st.i-1,pct=Math.round((st.i/st.tot)*100);
    const taken=Object.keys(st.sl).map(Number).sort((a,b)=>a-b);
    app.innerHTML=`<div class="pw"><div class="pb"><div class="pf" style="width:${pct}%"></div></div><span class="pl">${st.i+1}/${st.tot}</span></div><div class="ic fi"><div class="lb">${t('currentItem')}</div><div class="nm">${esc(cur)}</div><div class="ht">${rem===0?t('lastItem'):t('moreItems',rem)}</div></div><div class="sl">${t('whichPlace')}</div><div class="sg" id="sg"></div>${taken.length>0?'<div style="padding-top:1rem;border-top:1px solid rgba(255,255,255,0.05)"><div class="hi">'+taken.map(r=>'<strong>#'+r+'</strong> '+esc(st.sl[r])).join(' · ')+'</div></div>':''}`;
    const g=document.getElementById('sg');
    for(let r=1;r<=st.tot;r++){const tk=st.sl[r]!==undefined,el=document.createElement('div');el.className='s'+(tk?' tk':'');el.innerHTML=tk?'<div class="rk">'+r+'</div><div class="sn" title="'+esc(st.sl[r])+'">'+esc(st.sl[r])+'</div>':'<div class="rk">'+r+'</div><div class="fr">'+t('free')+'</div>';if(!tk)el.onclick=(rr=>()=>place(cur,rr))(r);g.appendChild(el);}
  }
  function place(item,rank){st.sl[rank]=item;st.i++;if(st.i>=st.tot)st.view='result';render();}
  function rResult(){
    const rankLabels=Array.from({length:st.tot},(_,i)=>st.sl[i+1]||'—');
    showGameResult(app,d,binId,rankLabels,null);
    document.getElementById('rb').onclick=()=>{st.q=shuffle(d.items);st.i=0;st.sl={};st.view='start';render();};
  }
  pageRerender=render;
  render();
}

function playImage(d,binId){
  const app=document.getElementById('app');
  const st={view:'start',d,q:shuffle(d.items),i:0,sl:{},tot:d.items.length};
  function render(){if(st.view==='start')rStart();else if(st.view==='rank')rRank();else rResult();}
  function rStart(){
    app.innerHTML=`<div class="brand" style="margin-bottom:.4rem"><span class="crown">🏆</span><h1>${esc(d.title)}</h1></div><p class="sub">${t('blindRanking')} · ${st.tot} ${t('images')}</p><div class="intro-box">${esc(d.intro||'')}</div><button class="btn-primary" id="sb">${t('startBtn')}</button>`;
    document.getElementById('sb').onclick=()=>{st.view='rank';render();};
  }
  function rRank(){
    const cur=st.q[st.i],rem=st.tot-st.i-1,pct=Math.round((st.i/st.tot)*100);
    const taken=Object.keys(st.sl).map(Number).sort((a,b)=>a-b);
    app.innerHTML=`<div class="pw"><div class="pb"><div class="pf" style="width:${pct}%"></div></div><span class="pl">${st.i+1}/${st.tot}</span></div><div class="img-card fi"><div class="img-wrap"><img src="${cur.img}" alt="${esc(cur.label||'')}"></div>${cur.label?`<div class="img-label">${esc(cur.label)}</div>`:''}<div class="img-hint">${rem===0?t('lastImage'):t('moreImages',rem)}</div></div><div class="sl">${t('whichPlace')}</div><div class="rank-row" id="rr"></div>${taken.length>0?'<div class="placed-list" id="pl"></div>':''}`;
    const row=document.getElementById('rr');
    for(let r=1;r<=st.tot;r++){const tk=st.sl[r]!==undefined,btn=document.createElement('div');btn.className='rb'+(tk?' taken':'');btn.innerHTML=tk?`<img class="rb-thumb" src="${st.sl[r].img}" alt=""><div class="rb-num">${r}</div>`:`<div class="rb-num">${r}</div><div class="rb-free">${t('free')}</div>`;if(!tk)btn.onclick=(rr=>()=>place(cur,rr))(r);row.appendChild(btn);}
    const pl=document.getElementById('pl');
    if(pl)taken.forEach(r=>{const row=document.createElement('div');row.className='placed-row';row.innerHTML=`<span class="pr-num">#${r}</span><img src="${st.sl[r].img}" alt=""><span>${esc(st.sl[r].label||'–')}</span>`;pl.appendChild(row);});
  }
  function place(item,rank){st.sl[rank]=item;st.i++;if(st.i>=st.tot)st.view='result';render();}
  function rResult(){
    const rankLabels=Array.from({length:st.tot},(_,i)=>(st.sl[i+1]?.label)||`${t('imgSlotLabel')} ${i+1}`);
    const rankImgs=Array.from({length:st.tot},(_,i)=>st.sl[i+1]?.img||null);
    showGameResult(app,d,binId,rankLabels,rankImgs);
    document.getElementById('rb').onclick=()=>{st.q=shuffle(d.items);st.i=0;st.sl={};st.view='start';render();};
  }
  pageRerender=render;
  render();
}

// ════════════════════════════════════════════════════════════════════
// PERSONAL RESULT
// ════════════════════════════════════════════════════════════════════
function initPersonalResult(resultId){
  pageRerender=()=>initPersonalResult(resultId);
  const app=document.getElementById('app');
  app.innerHTML=`<div class="loading-screen"><span class="spinner spinner-light sp"></span><p>${t('loadingResult')}</p></div>`;
  readBin(resultId).then(d=>{
    if(d.lang&&T[d.lang])LANG=d.lang;
    const mc={0:'m1',1:'m2',2:'m3'};
    const rows=(d.rankLabels||[]).map((lbl,i)=>{
      const imgHTML=d.rankImgs&&d.rankImgs[i]?`<img class="res-img" src="${d.rankImgs[i]}" alt="">`:'';
      return`<div class="res-row${i===0?' top1':''}"><div class="medal-wrap ${mc[i]||'mn'}">${i+1}</div>${imgHTML}<span style="font-size:14px;color:var(--text)">${esc(lbl)}</span></div>`;
    }).join('');
    const playURL=location.origin+location.pathname+'?bin='+d.binId;
    app.innerHTML=`
      <div class="result-card">
        <div class="result-card-header">
          <div class="rc-name">🏆 ${esc(d.name||t('anon'))}</div>
          <div class="rc-title">${esc(d.title)}</div>
        </div>
        <div class="result-card-body">
          <div class="result-grid" style="margin-bottom:1rem">${rows}</div>
          <div style="font-size:11px;color:var(--text3)">${fmtDate(d.ts)}</div>
        </div>
      </div>
      <div class="br" style="margin-top:1.25rem">
        <button class="btn-primary" id="play-btn">${t('playYourself')}</button>
        <button id="copy-url">${t('copyLink')}</button>
      </div>`;
    document.getElementById('play-btn').onclick=()=>location.href=playURL;
    copyBtn(document.getElementById('copy-url'),location.href);
  }).catch(()=>{app.innerHTML=`<p style="color:var(--text2);padding:1rem">${t('errResult')}</p>`;});
}

// ════════════════════════════════════════════════════════════════════
// GROUP RESULTS
// ════════════════════════════════════════════════════════════════════
function initGroupResults(resultsId){
  pageRerender=()=>initGroupResults(resultsId);
  const app=document.getElementById('app');
  function load(){
    app.innerHTML=`<div class="loading-screen"><span class="spinner spinner-light sp"></span><p>${t('loadingGroup')}</p></div>`;
    readBin(resultsId).then(d=>{
      const subs=d.submissions||[];
      if(subs.length===0){
        app.innerHTML=`<div class="brand"><span class="crown">🏆</span><h1>${t('groupTitle')}</h1></div><p style="color:var(--text2);font-size:14px;margin-top:1rem">${t('noSubs')}</p><div class="br" style="margin-top:1.5rem"><button id="ref">${t('refresh')}</button></div>`;
        document.getElementById('ref').onclick=load;return;
      }
      const labelCount={};
      subs.forEach(sub=>{(sub.rankLabels||[]).forEach((lbl,i)=>{if(!labelCount[lbl])labelCount[lbl]={total:0,count:0};labelCount[lbl].total+=(i+1);labelCount[lbl].count++;});});
      const agg=Object.entries(labelCount).map(([lbl,v])=>({lbl,avg:v.total/v.count,count:v.count})).sort((a,b)=>a.avg-b.avg);
      const aggHTML=agg.map((item,i)=>`
        <div class="agg-row">
          <div class="agg-rank">${i+1}</div>
          <div class="agg-label">${esc(item.lbl)}</div>
          <div class="agg-score">Ø ${item.avg.toFixed(1)}</div>
        </div>`).join('');
      const subsHTML=subs.slice().reverse().map(sub=>`
        <div class="group-submission">
          <div class="gs-name">👤 ${esc(sub.name||t('anon'))} <span style="font-size:11px;color:var(--text3);font-weight:400">${fmtDate(sub.ts)}</span></div>
          <div class="gs-items">${(sub.rankLabels||[]).map((lbl,i)=>`<span class="gs-item"><span class="gs-rank">#${i+1}</span> ${esc(lbl)}</span>`).join('')}</div>
        </div>`).join('');
      app.innerHTML=`
        <div class="brand" style="margin-bottom:.3rem"><span class="crown">🏆</span><h1>${t('groupTitle')}</h1></div>
        <p class="sub" style="margin-bottom:1.25rem">${t('aggregated')}</p>
        <div class="stat-row">
          <div class="stat-box"><div class="stat-num">${subs.length}</div><div class="stat-lbl">${t('submissions')}</div></div>
          <div class="stat-box"><div class="stat-num">${(agg[0]?.lbl||'—').substring(0,12)}</div><div class="stat-lbl">${t('mostChosen')}</div></div>
        </div>
        <div style="margin-bottom:1.5rem">${aggHTML}</div>
        <div class="divider"></div>
        <p class="sub" style="margin-bottom:1rem">${t('allSubs')}</p>
        ${subsHTML}
        <div class="br" style="margin-top:1.5rem"><button id="ref">${t('refresh')}</button></div>`;
      document.getElementById('ref').onclick=load;
    }).catch(()=>{app.innerHTML=`<p style="color:var(--text2);padding:1rem">${t('errLoad')}</p>`;});
  }
  load();
}

</script>
